# Dev mode — test targets + database + local LLM for scanning.
# Zero AWS dependency when using Ollama.
# NOT for production use. Use docker-compose.targets.yaml for isolated mode.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - diana_ollama:/root/.ollama

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: diana
      POSTGRES_USER: diana
      POSTGRES_PASSWORD: diana_dev
    volumes:
      - diana_pgdata:/var/lib/postgresql/data

  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"

  dvwa:
    image: vulnerables/web-dvwa:latest
    ports:
      - "8080:80"
    environment:
      - MYSQL_DATABASE=dvwa

  webgoat:
    image: webgoat/webgoat:latest
    ports:
      - "8888:8080"
    environment:
      - WEBGOAT_PORT=8080

volumes:
  diana_pgdata:
  diana_ollama:
